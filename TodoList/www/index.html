<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoIt - Modern Tasks</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Stylesheet -->
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <!-- Confetti canvas for completions -->
    <canvas id="confetti-canvas"></canvas>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <h1 class="app-title">DoIt</h1>
            <button class="theme-toggle-btn" id="theme-toggle" title="Toggle Theme" aria-label="Toggle Theme">
                <i class="fa-solid fa-moon"></i>
            </button>
        </header>

        <!-- Progress Tracker Dashboard -->
        <div class="progress-card">
            <div class="progress-info">
                <h3 class="progress-title">Your Progress</h3>
                <span class="progress-subtitle" id="progress-text">0 of 0 tasks completed</span>
            </div>
            <div class="progress-percentage" id="progress-percent">0%</div>
            <!-- Subtitle block holds progress bar inside CSS layout -->
            <div style="width: 100%; display: block;">
                <div class="progress-bar-outer">
                    <div class="progress-bar-inner" id="progress-bar-fill"></div>
                </div>
            </div>
        </div>

        <!-- Add Task Form -->
        <form id="todo-form" class="add-task-form" autocomplete="off">
            <div class="input-main-row">
                <input type="text" id="todo-input" class="input-text" placeholder="Add a new task..." required>
                <button type="submit" class="btn-add-task">
                    <i class="fa-solid fa-plus"></i> Add
                </button>
            </div>

            <div class="input-meta-row">
                <!-- Priority Selector -->
                <div class="meta-field meta-select-wrapper">
                    <select id="todo-priority" class="meta-select" title="Priority">
                        <option value="low">Low Priority</option>
                        <option value="medium" selected>Medium Priority</option>
                        <option value="high">High Priority</option>
                    </select>
                </div>

                <!-- Category Selector -->
                <div class="meta-field meta-select-wrapper">
                    <select id="todo-category" class="meta-select" title="Category">
                        <option value="work">Work</option>
                        <option value="personal" selected>Personal</option>
                        <option value="shopping">Shopping</option>
                        <option value="ideas">Ideas</option>
                    </select>
                </div>

                <!-- Due Date -->
                <div class="meta-field">
                    <input type="date" id="todo-duedate" class="meta-date" title="Due Date">
                </div>
            </div>
        </form>

        <!-- Controls (Search & Filters) -->
        <div class="controls-bar">
            <!-- Live Search -->
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="search" id="todo-search" class="search-input" placeholder="Search tasks..."
                    autocomplete="off">
            </div>

            <!-- Tabs and Actions -->
            <div class="tabs-wrapper">
                <div class="filter-tabs">
                    <button class="filter-tab active" data-filter="all">All</button>
                    <button class="filter-tab" data-filter="active">Active</button>
                    <button class="filter-tab" data-filter="completed">Completed</button>
                </div>
                <button id="clear-completed" class="btn-clear-completed">
                    <i class="fa-solid fa-trash-sweep"></i> Clear Done
                </button>
            </div>
        </div>

        <div class="swipe-hint" aria-label="Swipe actions help">
            <span><i class="fa-solid fa-arrow-right"></i> Glisse à droite pour cocher</span>
            <span><i class="fa-solid fa-arrow-left"></i> Glisse à gauche pour supprimer</span>
        </div>

        <!-- Task List -->
        <ul id="todo-list" class="todo-list">
            <!-- Dynamic task items go here -->
        </ul>

        <!-- Dynamic Empty State -->
        <div id="todo-empty" class="todo-empty-state" style="display: none;">
            <svg class="empty-state-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M9 5H7C5.89543 5 5 5.89543 5 7V19C5 20.1046 5.89543 21 7 21H17C18.1046 21 19 20.1046 19 19V7C19 5.89543 18.1046 5 17 5H15"
                    stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                <path
                    d="M9 5C9 3.89543 9.89543 3 11 3H13C14.1046 3 15 3.89543 15 5C15 6.10457 14.1046 7 13 7H11C9.89543 7 9 6.10457 9 5Z"
                    fill="var(--panel-bg)" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" />
                <path d="M9 12L11 14L15 10" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
            <h4 class="empty-state-title">No tasks found</h4>
            <p class="empty-state-desc">Try creating a task or changing your filters.</p>
        </div>
    </div>

    <!-- Edit Task Modal overlay -->
    <div id="edit-modal" class="modal-overlay">
        <div class="modal-card">
            <h3 class="modal-header">Modify Task</h3>
            <form id="modal-form" class="modal-form">
                <input type="hidden" id="edit-index">
                <input type="text" id="edit-input" class="input-text" required placeholder="Task text...">

                <div class="input-meta-row">
                    <!-- Edit Priority -->
                    <div class="meta-field meta-select-wrapper">
                        <select id="edit-priority" class="meta-select" title="Priority">
                            <option value="low">Low Priority</option>
                            <option value="medium">Medium Priority</option>
                            <option value="high">High Priority</option>
                        </select>
                    </div>

                    <!-- Edit Category -->
                    <div class="meta-field meta-select-wrapper">
                        <select id="edit-category" class="meta-select" title="Category">
                            <option value="work">Work</option>
                            <option value="personal">Personal</option>
                            <option value="shopping">Shopping</option>
                            <option value="ideas">Ideas</option>
                        </select>
                    </div>

                    <!-- Edit Due Date -->
                    <div class="meta-field">
                        <input type="date" id="edit-duedate" class="meta-date" title="Due Date">
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-modal btn-modal-cancel" id="btn-edit-cancel">Cancel</button>
                    <button type="submit" class="btn-modal btn-modal-save">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- jQuery Library -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Main JavaScript Logic -->
    <script src="js/index.js"></script>
</body>

</html>
